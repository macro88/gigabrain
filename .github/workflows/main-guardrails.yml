name: Main Guardrails

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  require-pr-path:
    name: Fail on direct main push
    runs-on: ubuntu-latest
    steps:
      - name: Verify push arrived via pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          repo = os.environ["REPOSITORY"]
          sha = os.environ["COMMIT_SHA"]
          url = f"https://api.github.com/repos/{repo}/commits/{sha}/pulls"
          req = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )

          try:
              with urllib.request.urlopen(req) as response:
                  prs = json.load(response)
          except urllib.error.HTTPError as exc:
              print(f"::error::Failed to query associated PRs for {sha}: HTTP {exc.code}")
              print(exc.read().decode("utf-8", errors="replace"))
              sys.exit(1)

          # A legitimate merge must satisfy ALL of:
          #   1. PR is closed and merged (state='closed', merged_at set)
          #   2. PR targets main (base.ref='main')
          #   3. The commit landing on main IS the merge commit of the PR
          #      (merge_commit_sha == sha)
          #
          # Condition 3 closes the bypass where a commit that appears on an
          # open or unmerged PR branch is pushed directly to main. In that
          # scenario /commits/{sha}/pulls returns the open PR, but its
          # merge_commit_sha points to the future merge commit (or is a
          # GitHub-synthesised test-merge ref), not to the commit being
          # pushed — so the filter rejects it and the direct push is caught.
          merged_via_pr = [
              pr for pr in prs
              if pr.get("state") == "closed"
              and pr.get("merged_at") is not None
              and pr.get("base", {}).get("ref") == "main"
              and pr.get("merge_commit_sha") == sha
          ]

          if merged_via_pr:
              summary = ", ".join(f"#{pr['number']}" for pr in merged_via_pr)
              print(f"Push to main arrived via merged pull request(s): {summary}")
              sys.exit(0)

          print("::error::Direct push to main detected. main must only receive changes through a pull request.")
          print(f"Actor: {os.environ['ACTOR']}")
          print(f"Run: {os.environ['RUN_URL']}")
          if prs:
              flagged = ", ".join(
                  f"#{pr['number']} (state={pr.get('state','?')}, merged_at={pr.get('merged_at')}, merge_commit_sha={pr.get('merge_commit_sha')})"
                  for pr in prs
              )
              print(f"Associated PRs that did not qualify: {flagged}")
          sys.exit(1)
          PY
